services:
  - type: web
    name: mkwazu-hardware-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: mkwazu-hardware-api
    runtime: docker
    rootDir: laravel-backend
    plan: free
    healthCheckPath: /up
    dockerCommand: sh ./render-start.sh
    envVars:
      - key: APP_NAME
        value: Mkwazu Hardware API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: FRONTEND_URLS
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: mkwazu-hardware-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mkwazu-hardware-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mkwazu-hardware-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mkwazu-hardware-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mkwazu-hardware-db
          property: password

databases:
  - name: mkwazu-hardware-db
    plan: free
